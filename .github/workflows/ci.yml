name: ci
on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: apps/api

      - name: Run tests
        run: |
          node src/index.js & 
          sleep 5
          curl --fail http://localhost:3000/health
        working-directory: apps/api