name: ci
on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: apps/api

      - name: Run tests
        run: |
          node src/index.js & 
          sleep 5
          curl --fail http://localhost:3000/health
        working-directory: apps/api
  docker-build:
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t greenhorn-api .
        working-directory: apps/api